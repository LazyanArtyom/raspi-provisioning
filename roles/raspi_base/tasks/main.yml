---
- name: Validate required LTE variables
  ansible.builtin.assert:
    that:
      - hostname is defined
      - lte_iface is defined
      - lte_ip is defined
      - lte_gateway is defined
      - lte_network is defined
      - lte_table is defined
      - lte_apn is defined
    fail_msg: "Missing per-host LTE variables. Check host_vars/{{ inventory_hostname }}.yml"

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Update /etc/hosts hostname mapping
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^127\\.0\\.1\\.1\\s+"
    line: "127.0.1.1 {{ hostname }}"
    create: true
    mode: "0644"

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ packages_common }}"
    state: present
    update_cache: true

- name: Enable base services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - ssh
    - NetworkManager
    - ModemManager

- name: Configure SSH ports
  ansible.builtin.template:
    src: ssh_ports.conf.j2
    dest: /etc/ssh/sshd_config.d/99-ports.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart ssh

- name: Validate sshd configuration
  ansible.builtin.command: sshd -t
  changed_when: false

- name: Configure reverse-path filtering for LTE policy routing
  ansible.builtin.template:
    src: lte_sysctl.conf.j2
    dest: /etc/sysctl.d/99-lte-policy-routing.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Apply sysctl immediately
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Check existing NetworkManager connections
  ansible.builtin.command: nmcli -t -f NAME connection show
  register: nm_connections
  changed_when: false

- name: Create LTE GSM connection if missing
  ansible.builtin.command: >
    nmcli connection add type gsm ifname "*" con-name {{ lte_connection_name }} apn {{ lte_apn }}
  when: lte_connection_name not in nm_connections.stdout_lines
  changed_when: true

- name: Configure LTE connection core settings
  ansible.builtin.command: >
    nmcli connection modify {{ lte_connection_name }}
    connection.autoconnect yes
    gsm.apn {{ lte_apn }}
    ipv4.method auto
    ipv6.method ignore
    ipv4.route-metric 700
    ipv4.route-table {{ lte_table }}
    ipv4.routing-rules "priority 100 from {{ lte_ip }}/32 table {{ lte_table }}"
  changed_when: true

- name: Configure LTE policy routes in NetworkManager
  ansible.builtin.command: >
    nmcli connection modify {{ lte_connection_name }}
    ipv4.routes "{{ lte_network }}, 0.0.0.0/0 {{ lte_gateway }}"
  changed_when: true

- name: Bring LTE connection up
  ansible.builtin.command: nmcli connection up {{ lte_connection_name }}
  register: lte_up
  changed_when: "'successfully activated' in lte_up.stdout or 'Connection successfully activated' in lte_up.stdout"
  failed_when: false

- name: Install LTE policy routing fallback script
  ansible.builtin.template:
    src: fix_lte_policy_routing.sh.j2
    dest: /usr/local/sbin/fix-lte-policy-routing.sh
    owner: root
    group: root
    mode: "0755"

- name: Install LTE policy routing fallback service
  ansible.builtin.template:
    src: lte-policy-routing.service.j2
    dest: /etc/systemd/system/lte-policy-routing.service
    owner: root
    group: root
    mode: "0644"

- name: Enable LTE policy routing fallback service
  ansible.builtin.systemd:
    name: lte-policy-routing.service
    enabled: true
    daemon_reload: true

- name: Start LTE policy routing fallback service
  ansible.builtin.systemd:
    name: lte-policy-routing.service
    state: started
  failed_when: false

- name: Show LTE route decision
  ansible.builtin.command: "ip route get 1.1.1.1 from {{ lte_ip }}"
  register: route_decision
  changed_when: false
  failed_when: false

- name: Print LTE route decision
  ansible.builtin.debug:
    var: route_decision.stdout
