---
- name: Reload validated ssh configuration
  ansible.builtin.systemd:
    name: ssh
    state: reloaded

- name: Apply LTE sysctl settings
  ansible.builtin.command: sysctl --load /etc/sysctl.d/99-lte-policy-routing.conf
  changed_when: false

- name: Restart LTE policy routing service
  ansible.builtin.systemd:
    name: lte-policy-routing.service
    state: restarted
