---
# Common settings for all Raspberry Pis.

ssh_ports:
  - 22
  - 2222

lte_connection_name: team-lte
lte_apn: internet
lte_table: 100
lte_rule_priority: 100
lte_route_metric: 700
lte_ipv6_method: disabled
telit_usb_vendor_id: "1bc7"
telit_usb_product_id: "1201"
modem_initial_detect_retries: 3
modem_rescan_retries: 3
modem_detect_retries: 12
modem_detect_delay: 5
modem_usb_reprobe_delay: 2
lte_ip_wait_retries: 18
lte_ip_wait_delay: 5

# Keep Wi-Fi as the normal default route for management.
# LTE policy routing handles replies from the LTE static IP.
wifi_iface: wlan0

packages_common:
  - curl
  - git
  - vim
  - nano
  - htop
  - tcpdump
  - net-tools
  - iproute2
  - openssh-server
  - network-manager
  - modemmanager
  - usb-modeswitch
  - usbutils
  - libqmi-utils
  - udhcpc
  - python3
  - python3-pip

mavlink_packages:
  - python3-pip
  - git
  - meson
  - ninja-build
  - pkg-config
  - gcc
  - g++
  - libsystemd-dev

mavlink_python_packages:
  - future
  - MAVProxy
  - pymavlink

# A drone Pi is provisioned as a dedicated appliance. Python command-line tools
# are installed system-wide under /usr/local instead of in per-tool venvs.
python_global_pip_extra_args: >-
  --break-system-packages
  --timeout 120
  --retries 10
  --resume-retries 10

mavlink_router_repo: https://github.com/mavlink-router/mavlink-router.git
mavlink_router_version: master
mavlink_router_src_dir: /opt/mavlink-router-src
mavlink_router_build_dir: /opt/mavlink-router-src/build
# Debian 13 split systemd.pc from libsystemd-dev into this package. Install it
# only when pkg-config cannot already resolve the required systemd metadata.
mavlink_router_systemd_metadata_package: systemd-dev

# MAVLink router service is installed/configured, but not enabled by default.
# Enable after you connect Pixhawk or decide endpoints are final.
mavlink_router_enable_service: false

mavlink_router_uart_device: /dev/ttyACM0
mavlink_router_uart_baud: 115200

mavlink_router_report_stats: true

# Default endpoints; override per host.
mavlink_router_endpoints:
  - name: qgc
    type: udp
    address: 192.168.123.46
    port: 14550
  - name: swarmkit_agent
    type: udp
    address: 127.0.0.1
    port: 14601

# SwarmKit development/build workspace.
swarmkit_build_user: admin
swarmkit_build_group: "{{ swarmkit_build_user }}"
swarmkit_build_home: "/home/{{ swarmkit_build_user }}"
swarmkit_workspace_root: "{{ swarmkit_build_home }}/workspace"
swarmkit_source_dir: "{{ swarmkit_workspace_root }}/swarmkit"

# Set this per inventory/group vault when Ansible should clone the repository.
# Leave empty to clone the private/proprietary repository manually after provisioning.
swarmkit_repo_url: ""
swarmkit_repo_version: main
swarmkit_repo_update: false

swarmkit_min_cmake_version: "3.28.0"
swarmkit_max_cmake_version: "4.0.0"
swarmkit_min_gcc_major: 13
swarmkit_build_packages:
  - build-essential
  - gcc
  - g++
  - cmake
  - ninja-build
  - pkg-config
  - git
  - ca-certificates
  - curl
  - python3
  - python3-pip
  - python3-dev
  - perl
  - m4
  - autoconf
  - automake
  - libtool
  - bison
  - flex
  - zip
  - unzip

swarmkit_python_build_tools:
  - "conan>=2,<3"
  - "cmake>=3.28,<4"
