---
# Common settings for all Raspberry Pis.

ssh_ports:
  - 22
  - 2222

lte_connection_name: team-lte
lte_apn: internet
lte_table: 100
lte_rule_priority: 100
lte_route_metric: 700
lte_ipv6_method: disabled
modem_detect_retries: 12
modem_detect_delay: 5
lte_ip_wait_retries: 18
lte_ip_wait_delay: 5

# Keep Wi-Fi as the normal default route for management.
# LTE policy routing handles replies from the LTE static IP.
wifi_iface: wlan0

packages_common:
  - curl
  - git
  - vim
  - nano
  - htop
  - tcpdump
  - net-tools
  - iproute2
  - openssh-server
  - network-manager
  - modemmanager
  - usb-modeswitch
  - usbutils
  - libqmi-utils
  - udhcpc
  - python3
  - python3-pip
  - python3-venv

mavlink_packages:
  - python3-pip
  - python3-venv
  - git
  - meson
  - ninja-build
  - pkg-config
  - gcc
  - g++
  - libsystemd-dev

mavlink_python_packages:
  - future
  - MAVProxy
  - pymavlink

mavlink_router_repo: https://github.com/mavlink-router/mavlink-router.git
mavlink_router_version: master
mavlink_router_src_dir: /opt/mavlink-router-src
mavlink_router_build_dir: /opt/mavlink-router-src/build

# MAVLink router service is installed/configured, but not enabled by default.
# Enable after you connect Pixhawk or decide endpoints are final.
mavlink_router_enable_service: false

mavlink_router_uart_device: /dev/ttyACM0
mavlink_router_uart_baud: 115200

mavlink_router_report_stats: true

# Default endpoints; override per host.
mavlink_router_endpoints:
  - name: qgc
    type: udp
    address: 192.168.123.46
    port: 14550
  - name: swarmkit_agent
    type: udp
    address: 127.0.0.1
    port: 14601
